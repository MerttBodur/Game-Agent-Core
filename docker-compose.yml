services:
  mysql:
    image: mysql:8.4
    container_name: toolrecommender-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: toolrecommender
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  chroma:
    image: chromadb/chroma:0.6.3
    container_name: toolrecommender-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/data
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql-data:
  chroma-data:
