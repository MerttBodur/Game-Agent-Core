openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Game Dev Stack Advisor API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: advisor
    description: AI-powered game dev stack advisor
  - name: tools
    description: Game development tool catalog
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /advisor/analyze:
    post:
      operationId: analyzeProject
      tags: [advisor]
      summary: Analyze project and recommend tools
      description: Takes user project inputs and returns a full AI-powered tool stack recommendation with RAG-backed rationale
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "200":
          description: Tool stack recommendation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /advisor/sessions:
    get:
      operationId: listSessions
      tags: [advisor]
      summary: List recent analysis sessions
      description: Returns a list of recent project analysis sessions
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionSummary"

  /advisor/sessions/{id}:
    get:
      operationId: getSession
      tags: [advisor]
      summary: Get a specific analysis session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session with full analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tools:
    get:
      operationId: listTools
      tags: [tools]
      summary: List all tools in the catalog
      parameters:
        - { name: category, in: query, required: false, schema: { type: string } }
        - { name: platform, in: query, required: false, schema: { type: string } }
        - { name: pricing, in: query, required: false, schema: { type: string } }
        - { name: difficulty, in: query, required: false, schema: { type: string } }
        - { name: teamSize, in: query, required: false, schema: { type: string } }
        - { name: fit2d3d, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Tool catalog list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tool"

  /tools/{id}:
    get:
      operationId: getTool
      tags: [tools]
      summary: Get a specific tool by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tool details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tool"
        "404":
          description: Tool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tools/categories:
    get:
      operationId: getToolCategories
      tags: [tools]
      summary: List all tool categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ToolCategory"

  /advisor/stats:
    get:
      operationId: getAdvisorStats
      tags: [advisor]
      summary: Get advisor usage statistics
      description: Returns stats like total analyses, most recommended tools, popular categories
      responses:
        "200":
          description: Advisor statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvisorStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ProjectInput:
      type: object
      properties:
        projectIdea:
          type: string
          description: Description of the game project idea
        budget:
          type: string
          enum: [zero, low, medium, high, enterprise]
          description: Budget range for the project
        timeLimit:
          type: string
          enum: [jam, month, quarter, year, longterm]
          description: Time available for the project
        skillLevel:
          type: string
          enum: [beginner, intermediate, advanced, expert]
          description: Developer skill level
        teamSize:
          type: string
          enum: [solo, team]
          description: Team size
        platformTarget:
          type: array
          items:
            type: string
          description: Target platforms (pc, mobile, web, console, vr)
        artCapability:
          type: string
          enum: [none, basic, intermediate, advanced, professional]
          description: Art and design capability level
        multiplayer:
          type: boolean
          description: Whether the project requires multiplayer
        otherConstraints:
          type: ["string", "null"]
          description: Any other constraints or notes
        paidPriorityCategories:
          type: array
          items:
            type: string
          description: "Category ids where user accepts paid tools. Empty = prefer free."
        pinnedToolIds:
          type: array
          items:
            type: string
          description: "Tool ids the user explicitly wants kept; reasoning will adapt around them."
        adviseAnyway:
          type: boolean
          description: "Set true to bypass block-tier early-return"
      required:
        - projectIdea
        - budget
        - timeLimit
        - skillLevel
        - teamSize
        - platformTarget
        - artCapability
        - multiplayer

    Phase:
      type: string
      enum: [planning, programming, version_control, art_assets, audio, deployment_publishing]

    RecommendationItem:
      type: object
      properties:
        toolId:
          type: string
        score:
          type: number
          minimum: 0
          maximum: 100
        reasoning:
          type: string
        pros:
          type: array
          items:
            type: string
        cons:
          type: array
          items:
            type: string
        compatibility:
          type: string
        useCaseJustification:
          type: string
        phase:
          type: array
          items:
            $ref: "#/components/schemas/Phase"
      required:
        - toolId
        - score
        - reasoning
        - pros
        - cons
        - compatibility
        - useCaseJustification
        - phase

    Recommendation:
      type: object
      properties:
        category:
          type: string
          enum: [game_engine, ide, version_control, art_asset_creation, audio, ai_coding_assistant, deployment_publishing]
        primary:
          $ref: "#/components/schemas/RecommendationItem"
        alternatives:
          type: array
          maxItems: 2
          items:
            $ref: "#/components/schemas/RecommendationItem"
      required:
        - category
        - primary
        - alternatives

    Retrieval:
      type: object
      properties:
        relevantCategories:
          type: array
          items:
            type: string
            enum: [game_engine, ide, version_control, art_asset_creation, audio, ai_coding_assistant, deployment_publishing]
        candidateTools:
          type: array
          items:
            type: object
            properties:
              toolId:
                type: string
              nodePath:
                type: string
              fitNote:
                type: string
            required:
              - toolId
              - nodePath
              - fitNote
        rejectedTools:
          type: array
          items:
            type: object
            properties:
              toolId:
                type: string
              reason:
                type: string
            required:
              - toolId
              - reason
        missingInformationNotes:
          type: array
          items:
            type: string
        retrievalConfidence:
          type: number
          minimum: 0
          maximum: 100
        fallbackStatus:
          type: string
          enum: [ok, weak_coverage, ambiguous_input, missing_domain]
      required:
        - relevantCategories
        - candidateTools
        - rejectedTools
        - missingInformationNotes
        - retrievalConfidence
        - fallbackStatus

    ArchetypeScope:
      type: string
      enum: [jam, prototype, indie, AA, AAA]

    ProjectMode:
      type: string
      enum: [single_player, co_op_local, multiplayer_online, live_service]

    IdeaScoreTier:
      type: string
      enum: [block, warn, pass]

    ArchetypePair:
      type: object
      properties:
        scope:
          $ref: "#/components/schemas/ArchetypeScope"
      required:
        - scope

    ProjectArchetype:
      type: object
      properties:
        implied:
          $ref: "#/components/schemas/ArchetypePair"
        achievable:
          $ref: "#/components/schemas/ArchetypePair"
      required:
        - implied
        - achievable

    Evidence:
      type: object
      properties:
        scoreBreakdown:
          type: object
          properties:
            budget: { type: number }
            skill: { type: number }
            platform: { type: number }
            timeLimit: { type: number }
            artCapability: { type: number }
            popularity: { type: number }
            paidPriority: { type: number }
            jitter: { type: number }
            total: { type: number }
        ragChunks:
          type: array
          items:
            type: object
            properties:
              text:
                type: string
              source:
                type: string
            required:
              - text
              - source
      required:
        - scoreBreakdown
        - ragChunks

    CategoryRecommendationTool:
      type: object
      properties:
        toolId:
          oneOf:
            - type: string
            - type: integer
        toolName:
          type: string
        score:
          type: number
        reasoning:
          type: string
        strengths:
          type: array
          items:
            type: string
        weaknesses:
          type: array
          items:
            type: string
        tradeoffs:
          type: string
        evidence:
          $ref: "#/components/schemas/Evidence"
        isTopPick:
          type: boolean
      required:
        - toolId
        - toolName
        - score
        - reasoning
        - strengths
        - weaknesses
        - tradeoffs
        - isTopPick

    CategoryRecommendation:
      type: object
      properties:
        category:
          type: string
        categoryLabel:
          type: string
        topPick:
          $ref: "#/components/schemas/CategoryRecommendationTool"
        alternatives:
          type: array
          items:
            $ref: "#/components/schemas/CategoryRecommendationTool"
        categoryReasoning:
          type: string
      required:
        - category
        - categoryLabel
        - topPick
        - alternatives
        - categoryReasoning

    CategoryResults:
      type: object
      properties:
        locked:
          type: array
          items:
            $ref: "#/components/schemas/CategoryRecommendation"
        flexible:
          type: array
          items:
            $ref: "#/components/schemas/CategoryRecommendation"
        hidden:
          type: array
          items:
            type: string
        candidatePool:
          type: object
          additionalProperties:
            type: array
            items:
              type: object
              additionalProperties: true
      required:
        - locked
        - flexible
        - hidden
        - candidatePool

    AnalysisResult:
      type: object
      properties:
        sessionId:
          type: string
          description: Empty string when terminated is true
        projectSummary:
          type: string
        trustScore:
          type: integer
          minimum: 0
          maximum: 100
        trustTier:
          type: string
          enum: [block, warn, pass]
        terminated:
          type: boolean
        retrieval:
          $ref: "#/components/schemas/Retrieval"
        detectedProjectType:
          type: string
        overallConfidence:
          type: number
        stackOverview:
          type: ["string", "null"]
        ideaScore:
          type: number
        ideaScoreTier:
          $ref: "#/components/schemas/IdeaScoreTier"
        mismatchReasons:
          type: array
          items:
            type: string
        archetype:
          $ref: "#/components/schemas/ProjectArchetype"
        projectMode:
          $ref: "#/components/schemas/ProjectMode"
        feasibilityOverridden:
          type: boolean
        categoryResults:
          $ref: "#/components/schemas/CategoryResults"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/CategoryRecommendation"
        engineDecision:
          $ref: "#/components/schemas/EngineDecision"
        lockedCategories:
          type: array
          items:
            $ref: "#/components/schemas/LockedCategory"
        skippedCategories:
          type: array
          items:
            $ref: "#/components/schemas/SkippedCategory"
        retryMetadata:
          $ref: "#/components/schemas/RetryMetadata"
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/Recommendation"
        finalSummary:
          type: string
      required:
        - sessionId
        - projectSummary
        - trustScore
        - trustTier
        - terminated
        - retrieval
        - detectedProjectType
        - overallConfidence
        - stackOverview
        - ideaScore
        - ideaScoreTier
        - mismatchReasons
        - archetype
        - projectMode
        - feasibilityOverridden
        - recommendations
        - finalSummary

    EngineDecision:
      type: object
      properties:
        picked:
          type: string
          enum: [Unity, Unreal, Godot, Custom]
        userPreferred:
          oneOf:
            - type: "null"
            - type: string
              enum: [Unity, Unreal, Godot, Custom, unknown]
        agreement:
          type: string
          enum: [agreed, challenged, user_silent]
        reasoning:
          type: string
        alternativesConsidered:
          type: array
          items:
            type: object
            properties:
              engine:
                type: string
                enum: [Unity, Unreal, Godot, Custom, unknown]
              reasonRejected:
                type: string
            required:
              - engine
              - reasonRejected
      required:
        - picked
        - userPreferred
        - agreement
        - reasoning
        - alternativesConsidered

    LockedCategory:
      type: object
      properties:
        category:
          type: string
        lockedTo:
          type: array
          items:
            type: string
        note:
          type: string
      required:
        - category
        - lockedTo
        - note

    SkippedCategory:
      type: object
      properties:
        category:
          type: string
        reason:
          type: string
      required:
        - category
        - reason

    RetryHistoryItem:
      type: object
      properties:
        attempt:
          type: integer
        mode:
          type: string
          enum: [broaden, pre_filter]
        countBefore:
          type: integer
        categories:
          type: array
          items:
            type: string
      required:
        - attempt
        - mode
        - countBefore

    RetryMetadata:
      type: object
      properties:
        retryCount:
          type: integer
        history:
          type: array
          items:
            $ref: "#/components/schemas/RetryHistoryItem"
      required:
        - retryCount
        - history

    SessionSummary:
      type: object
      properties:
        id:
          type: string
        projectIdea:
          type: string
        trustScore:
          type: integer
        trustTier:
          type: string
          enum: [block, warn, pass]
        detectedProjectType:
          type: string
        overallConfidence:
          type: number
        stackOverview:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectIdea
        - trustScore
        - trustTier
        - detectedProjectType
        - overallConfidence
        - stackOverview
        - createdAt

    Session:
      type: object
      properties:
        id:
          type: string
        projectInput:
          $ref: "#/components/schemas/ProjectInput"
        result:
          $ref: "#/components/schemas/AnalysisResult"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectInput
        - result
        - createdAt

    Tool:
      type: object
      properties:
        id:
          type: string
          description: Stable snake_case slug
        name:
          type: string
        category:
          type: string
          enum: [game_engine, ide, version_control, art_asset_creation, audio, ai_coding_assistant, deployment_publishing]
        subcategory:
          type: ["string", "null"]
        description:
          type: string
        bestUseCase:
          type: string
        bestFor:
          type: array
          items:
            type: string
        supportedPlatforms:
          type: array
          items:
            type: string
            enum: [pc, mobile, web, console, vr, ar]
        platforms:
          type: array
          items:
            type: string
        pricing:
          type: string
          enum: [free, open_source, freemium, paid, subscription, revenue_share, enterprise]
        difficultyLevel:
          type: string
          enum: [beginner, intermediate, advanced]
        minSkillLevel:
          type: string
          enum: [beginner, intermediate, advanced, expert]
        beginnerSuitability:
          type: integer
          minimum: 0
          maximum: 100
        teamSizeFit:
          type: array
          items:
            type: string
            enum: [solo, small, medium, large]
        genreFit:
          type: array
          items:
            type: string
        fit2d3d:
          type: string
          enum: [2d, 3d, both]
        pros:
          type: array
          items:
            type: string
        strengths:
          type: array
          items:
            type: string
        cons:
          type: array
          items:
            type: string
        weaknesses:
          type: array
          items:
            type: string
        alternatives:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        phase:
          type: array
          items:
            type: string
            enum: [planning, programming, version_control, art_assets, audio, deployment_publishing]
        website:
          type: ["string", "null"]
      required:
        - id
        - name
        - category
        - description
        - bestUseCase
        - bestFor
        - supportedPlatforms
        - platforms
        - pricing
        - difficultyLevel
        - minSkillLevel
        - beginnerSuitability
        - teamSizeFit
        - genreFit
        - fit2d3d
        - pros
        - strengths
        - cons
        - weaknesses
        - alternatives
        - tags
        - phase

    ToolCategory:
      type: object
      properties:
        id:
          type: string
          enum: [game_engine, ide, version_control, art_asset_creation, audio, ai_coding_assistant, deployment_publishing]
        label:
          type: string
        description:
          type: string
        toolCount:
          type: integer
      required:
        - id
        - label
        - description
        - toolCount

    AdvisorStats:
      type: object
      properties:
        totalAnalyses:
          type: integer
        topRecommendedTools:
          type: array
          items:
            type: object
            properties:
              toolName:
                type: string
              count:
                type: integer
            required:
              - toolName
              - count
        popularCategories:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
              count:
                type: integer
            required:
              - category
              - count
        avgConfidenceScore:
          type: number
      required:
        - totalAnalyses
        - topRecommendedTools
        - popularCategories
        - avgConfidenceScore
