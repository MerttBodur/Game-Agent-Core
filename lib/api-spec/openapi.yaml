openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Game Dev Stack Advisor API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: advisor
    description: AI-powered game dev stack advisor
  - name: tools
    description: Game development tool catalog
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /advisor/analyze:
    post:
      operationId: analyzeProject
      tags: [advisor]
      summary: Analyze project and recommend tools
      description: Takes user project inputs and streams a full AI-powered tool stack recommendation with RAG-backed rationale
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "200":
          description: Tool stack recommendation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /advisor/sessions:
    get:
      operationId: listSessions
      tags: [advisor]
      summary: List recent analysis sessions
      description: Returns a list of recent project analysis sessions
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionSummary"

  /advisor/sessions/{id}:
    get:
      operationId: getSession
      tags: [advisor]
      summary: Get a specific analysis session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session with full analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tools:
    get:
      operationId: listTools
      tags: [tools]
      summary: List all tools in the catalog
      parameters:
        - { name: category, in: query, required: false, schema: { type: string } }
        - { name: platform, in: query, required: false, schema: { type: string } }
        - { name: pricing, in: query, required: false, schema: { type: string } }
        - { name: difficulty, in: query, required: false, schema: { type: string } }
        - { name: toolNature, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Tool catalog list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tool"

  /tools/{id}:
    get:
      operationId: getTool
      tags: [tools]
      summary: Get a specific tool by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tool details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tool"
        "404":
          description: Tool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tools/categories:
    get:
      operationId: getToolCategories
      tags: [tools]
      summary: List all tool categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ToolCategory"

  /advisor/stats:
    get:
      operationId: getAdvisorStats
      tags: [advisor]
      summary: Get advisor usage statistics
      description: Returns stats like total analyses, most recommended tools, and popular categories
      responses:
        "200":
          description: Advisor statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvisorStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Category:
      type: string
      enum: [game_engine, art_asset, vfx, animation, audio, ai_coding]

    ProjectInput:
      type: object
      properties:
        projectIdea:
          type: string
          description: Description of the game project idea
        budget:
          type: string
          enum: [low, medium, high, enterprise]
          description: Budget range for the project
        skillLevel:
          type: string
          enum: [beginner, intermediate, advanced, expert]
          description: Developer skill level
        platformTarget:
          type: array
          items:
            type: string
          description: Target platforms (pc, mobile, web, console, vr, ar)
        artCapability:
          type: string
          enum: [none, basic, intermediate, advanced, professional]
          description: Art and design capability level
        pinnedToolIds:
          type: array
          items:
            type: string
          description: Tool ids the user explicitly wants kept.
      required:
        - projectIdea
        - budget
        - skillLevel
        - platformTarget
        - artCapability

    RecommendationItem:
      type: object
      properties:
        toolId:
          type: string
        score:
          type: number
          minimum: 0
          maximum: 10
        scoreReason:
          type: string
        reasoning:
          type: string
        pros:
          type: array
          items:
            type: string
        cons:
          type: array
          items:
            type: string
      required:
        - toolId
        - score
        - scoreReason
        - reasoning
        - pros
        - cons

    Recommendation:
      type: object
      properties:
        category:
          $ref: "#/components/schemas/Category"
        primary:
          $ref: "#/components/schemas/RecommendationItem"
        alternatives:
          type: array
          maxItems: 2
          items:
            $ref: "#/components/schemas/RecommendationItem"
        reasoning:
          type: string
      required:
        - category
        - primary
        - alternatives
        - reasoning

    EngineDecision:
      type: object
      properties:
        picked:
          type: string
          enum: [Unity, Unreal, Godot]
        userPreferred:
          oneOf:
            - type: "null"
            - type: string
              enum: [Unity, Unreal, Godot]
        agreement:
          type: string
          enum: [agreed, challenged, user_silent]
        reasoning:
          type: string
        alternativesConsidered:
          type: array
          items:
            type: object
            properties:
              engine:
                type: string
                enum: [Unity, Unreal, Godot]
              reasonRejected:
                type: string
            required:
              - engine
              - reasonRejected
      required:
        - picked
        - userPreferred
        - agreement
        - reasoning
        - alternativesConsidered

    AnalysisResult:
      type: object
      properties:
        sessionId:
          type: string
          description: Empty string when terminated is true
        feasible:
          type: boolean
        reason:
          type: string
        terminated:
          type: boolean
        projectSummary:
          type: string
        engineDecision:
          $ref: "#/components/schemas/EngineDecision"
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/Recommendation"
        finalSummary:
          type: string
      required:
        - sessionId
        - feasible
        - reason
        - terminated
        - projectSummary
        - recommendations
        - finalSummary

    SessionSummary:
      type: object
      properties:
        id:
          type: string
        projectIdea:
          type: string
        feasible:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectIdea
        - feasible
        - createdAt

    Session:
      type: object
      properties:
        id:
          type: string
        projectInput:
          $ref: "#/components/schemas/ProjectInput"
        result:
          $ref: "#/components/schemas/AnalysisResult"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectInput
        - result
        - createdAt

    Tool:
      type: object
      properties:
        id:
          type: string
          description: Stable snake_case slug
        name:
          type: string
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        description:
          type: string
        bestUseCase:
          type: string
        toolNature:
          type: string
          enum: [ai, traditional, hybrid]
        learningCurve:
          type: string
          enum: [low, medium, high]
        engineCompatibility:
          type: array
          items:
            type: string
            enum: [Unity, Unreal, Godot, any]
        pricing:
          type: string
          enum: [free, open_source, freemium, paid, subscription, revenue_share, enterprise]
        difficultyLevel:
          type: string
          enum: [beginner, intermediate, advanced]
        beginnerSuitability:
          type: integer
          minimum: 0
          maximum: 100
        supportedPlatforms:
          type: array
          items:
            type: string
            enum: [pc, mobile, web, console, vr, ar]
        pros:
          type: array
          items:
            type: string
        cons:
          type: array
          items:
            type: string
        website:
          type: string
      required:
        - id
        - name
        - categories
        - description
        - bestUseCase
        - toolNature
        - learningCurve
        - engineCompatibility
        - pricing
        - difficultyLevel
        - beginnerSuitability
        - supportedPlatforms
        - pros
        - cons

    ToolCategory:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Category"
        label:
          type: string
        toolCount:
          type: integer
      required:
        - id
        - label
        - toolCount

    AdvisorStats:
      type: object
      properties:
        totalAnalyses:
          type: integer
        topRecommendedTools:
          type: array
          items:
            type: object
            properties:
              toolName:
                type: string
              count:
                type: integer
            required:
              - toolName
              - count
        popularCategories:
          type: array
          items:
            type: object
            properties:
              category:
                $ref: "#/components/schemas/Category"
              count:
                type: integer
            required:
              - category
              - count
        avgRecommendationsPerAnalysis:
          type: number
      required:
        - totalAnalyses
        - topRecommendedTools
        - popularCategories
        - avgRecommendationsPerAnalysis
