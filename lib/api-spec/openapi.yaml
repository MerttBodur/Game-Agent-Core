openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Game Dev Stack Advisor API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: advisor
    description: AI-powered game dev stack advisor
  - name: tools
    description: Game development tool catalog
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /advisor/analyze:
    post:
      operationId: analyzeProject
      tags: [advisor]
      summary: Analyze project and recommend tools
      description: Takes user project inputs and returns a full AI-powered tool stack recommendation with RAG-backed rationale
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "200":
          description: Tool stack recommendation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /advisor/sessions:
    get:
      operationId: listSessions
      tags: [advisor]
      summary: List recent analysis sessions
      description: Returns a list of recent project analysis sessions
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionSummary"

  /advisor/sessions/{id}:
    get:
      operationId: getSession
      tags: [advisor]
      summary: Get a specific analysis session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session with full analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tools:
    get:
      operationId: listTools
      tags: [tools]
      summary: List all tools in the catalog
      parameters:
        - { name: category, in: query, required: false, schema: { type: string } }
        - { name: platform, in: query, required: false, schema: { type: string } }
        - { name: pricing, in: query, required: false, schema: { type: string } }
        - { name: difficulty, in: query, required: false, schema: { type: string } }
        - { name: teamSize, in: query, required: false, schema: { type: string } }
        - { name: fit2d3d, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Tool catalog list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tool"

  /tools/{id}:
    get:
      operationId: getTool
      tags: [tools]
      summary: Get a specific tool by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tool details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tool"
        "404":
          description: Tool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tools/categories:
    get:
      operationId: getToolCategories
      tags: [tools]
      summary: List all tool categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ToolCategory"

  /advisor/stats:
    get:
      operationId: getAdvisorStats
      tags: [advisor]
      summary: Get advisor usage statistics
      description: Returns stats like total analyses, most recommended tools, popular categories
      responses:
        "200":
          description: Advisor statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvisorStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ProjectInput:
      type: object
      properties:
        projectIdea:
          type: string
          description: Description of the game project idea
        budget:
          type: string
          enum: [zero, low, medium, high, enterprise]
          description: Budget range for the project
        timeLimit:
          type: string
          enum: [jam, month, quarter, year, longterm]
          description: Time available for the project
        skillLevel:
          type: string
          enum: [beginner, intermediate, advanced, expert]
          description: Developer skill level
        teamSize:
          type: string
          enum: [solo, small, medium, large]
          description: Team size
        platformTarget:
          type: array
          items:
            type: string
          description: Target platforms (pc, mobile, web, console, vr)
        artCapability:
          type: string
          enum: [none, basic, intermediate, advanced, professional]
          description: Art and design capability level
        otherConstraints:
          type: ["string", "null"]
          description: Any other constraints or notes
        paidPriorityCategories:
          type: array
          items:
            type: string
          description: "Category ids where user accepts paid tools. Empty = prefer free."
        adviseAnyway:
          type: boolean
          description: "Set true to bypass block-tier early-return"
      required:
        - projectIdea
        - budget
        - timeLimit
        - skillLevel
        - teamSize
        - platformTarget
        - artCapability

    ToolRecommendation:
      type: object
      properties:
        toolId:
          type: integer
        toolName:
          type: string
        score:
          type: number
          description: Fit score 0-100
        reasoning:
          type: string
          description: Why this tool was recommended
        strengths:
          type: array
          items:
            type: string
        weaknesses:
          type: array
          items:
            type: string
        tradeoffs:
          type: string
        isTopPick:
          type: boolean
        evidence:
          $ref: "#/components/schemas/Evidence"
      required:
        - toolId
        - toolName
        - score
        - reasoning
        - strengths
        - weaknesses
        - tradeoffs
        - isTopPick

    ScoreBreakdown:
      type: object
      properties:
        budget:
          type: number
        skill:
          type: number
        platform:
          type: number
        timeLimit:
          type: number
        artCapability:
          type: number
        total:
          type: number
      required:
        - budget
        - skill
        - platform
        - timeLimit
        - artCapability
        - total

    RagChunk:
      type: object
      properties:
        text:
          type: string
        source:
          type: string
        score:
          type: ["number", "null"]
      required:
        - text
        - source

    Evidence:
      type: object
      properties:
        scoreBreakdown:
          $ref: "#/components/schemas/ScoreBreakdown"
        ragChunks:
          type: array
          items:
            $ref: "#/components/schemas/RagChunk"
      required:
        - scoreBreakdown
        - ragChunks

    Archetype:
      type: object
      properties:
        scope:
          type: string
          enum: [jam, prototype, indie, AA, AAA]
      required:
        - scope

    CategoryResults:
      type: object
      properties:
        locked:
          type: array
          items:
            $ref: "#/components/schemas/CategoryRecommendation"
        flexible:
          type: array
          items:
            $ref: "#/components/schemas/CategoryRecommendation"
        hidden:
          type: array
          items:
            type: string
          description: "Category ids hidden by projectMode (e.g. networking, backend_services)"
        candidatePool:
          type: object
          additionalProperties:
            type: array
            items:
              type: object
          description: "Per-category full candidate pool (pre-hard-filter), keyed by category id. Used by client-side recompute on Mode/Archetype edit."
      required:
        - locked
        - flexible
        - hidden

    CategoryRecommendation:
      type: object
      properties:
        category:
          type: string
        categoryLabel:
          type: string
        topPick:
          $ref: "#/components/schemas/ToolRecommendation"
        alternatives:
          type: array
          items:
            $ref: "#/components/schemas/ToolRecommendation"
        categoryReasoning:
          type: string
      required:
        - category
        - categoryLabel
        - topPick
        - alternatives
        - categoryReasoning

    AnalysisResult:
      type: object
      properties:
        sessionId:
          type: integer
        projectSummary:
          type: string
        detectedProjectType:
          type: string
        categoryResults:
          oneOf:
            - $ref: "#/components/schemas/CategoryResults"
            - type: "null"
          description: "Null when ideaScoreTier == 'block' and adviseAnyway is false"
        overallConfidence:
          type: number
        finalSummary:
          type: ["string", "null"]
        stackOverview:
          type: ["string", "null"]
        ideaScore:
          type: number
          description: "0-100 feasibility score, may be decimal"
        ideaScoreTier:
          type: string
          enum: [pass, warn, block]
        mismatchReasons:
          type: array
          items:
            type: string
        archetype:
          type: object
          properties:
            implied:
              $ref: "#/components/schemas/Archetype"
            achievable:
              $ref: "#/components/schemas/Archetype"
          required:
            - implied
            - achievable
        projectMode:
          type: string
          enum: [single_player, co_op_local, multiplayer_online, live_service]
        feasibilityOverridden:
          type: boolean
          default: false
      required:
        - sessionId
        - projectSummary
        - detectedProjectType
        - overallConfidence
        - ideaScore
        - ideaScoreTier
        - mismatchReasons
        - archetype
        - projectMode
        - feasibilityOverridden

    SessionSummary:
      type: object
      properties:
        id:
          type: integer
        projectIdea:
          type: string
        detectedProjectType:
          type: string
        stackOverview:
          type: string
        overallConfidence:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectIdea
        - detectedProjectType
        - stackOverview
        - overallConfidence
        - createdAt

    Session:
      type: object
      properties:
        id:
          type: integer
        projectInput:
          $ref: "#/components/schemas/ProjectInput"
        result:
          $ref: "#/components/schemas/AnalysisResult"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectInput
        - result
        - createdAt

    Tool:
      type: object
      properties:
        id:
          type: string
          description: Stable snake_case slug
        name:
          type: string
        category:
          type: string
          enum: [game_engine, ide, version_control, art_asset_creation, audio, ai_coding_assistant, deployment_publishing]
        subcategory:
          type: ["string", "null"]
        description:
          type: string
        bestUseCase:
          type: string
        supportedPlatforms:
          type: array
          items:
            type: string
            enum: [pc, mobile, web, console, vr, ar]
        pricing:
          type: string
          enum: [free, open_source, freemium, paid, subscription, revenue_share, enterprise]
        difficultyLevel:
          type: string
          enum: [beginner, intermediate, advanced]
        beginnerSuitability:
          type: integer
          minimum: 0
          maximum: 100
        teamSizeFit:
          type: array
          items:
            type: string
            enum: [solo, small, medium, large]
        genreFit:
          type: array
          items:
            type: string
        fit2d3d:
          type: string
          enum: [2d, 3d, both]
        pros:
          type: array
          items:
            type: string
        cons:
          type: array
          items:
            type: string
        alternatives:
          type: array
          items:
            type: string
        phase:
          type: array
          items:
            type: string
            enum: [planning, programming, version_control, art_assets, audio, deployment_publishing]
        website:
          type: ["string", "null"]
      required:
        - id
        - name
        - category
        - description
        - bestUseCase
        - supportedPlatforms
        - pricing
        - difficultyLevel
        - beginnerSuitability
        - teamSizeFit
        - genreFit
        - fit2d3d
        - pros
        - cons
        - alternatives
        - phase

    ToolCategory:
      type: object
      properties:
        id:
          type: string
          enum: [game_engine, ide, version_control, art_asset_creation, audio, ai_coding_assistant, deployment_publishing]
        label:
          type: string
        description:
          type: string
        toolCount:
          type: integer
      required:
        - id
        - label
        - description
        - toolCount

    AdvisorStats:
      type: object
      properties:
        totalAnalyses:
          type: integer
        topRecommendedTools:
          type: array
          items:
            type: object
            properties:
              toolName:
                type: string
              count:
                type: integer
            required:
              - toolName
              - count
        popularCategories:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
              count:
                type: integer
            required:
              - category
              - count
        avgConfidenceScore:
          type: number
      required:
        - totalAnalyses
        - topRecommendedTools
        - popularCategories
        - avgConfidenceScore
